services:                                                                                                                                                                                                                           
  frontend:                                                                                                                                                                                                                         
    build:                                                                                                                                                                                                                          
      context: ./frontend                                                                                                                                                                                                           
    restart: unless-stopped                                                                                                                                                                                                         
    networks:                                                                                                                                                                                                                       
      - app_svechka-network                                                                                                                                                                                                         
                                                                                                                                                                                                                                    
  caddy:                                                                                                                                                                                                                            
    image: caddy:2-alpine                                                                                                                                                                                                           
    ports:                                                                                                                                                                                                                          
      - "80:80"                                                                                                                                                                                                                     
      - "443:443"                                                                                                                                                                                                                   
    env_file:                                                                                                                                                                                                                       
      - /opt/app/.env                                                                                                                                                                                                               
    volumes:                                                                                                                                                                                                                        
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile                                                                                                                                                                                      
      - caddy-data:/data                                                                                                                                                                                                            
      - caddy-config:/config                                                                                                                                                                                                        
    depends_on:                                                                                                                                                                                                                     
      - frontend                                                                                                                                                                                                                    
    restart: unless-stopped                                                                                                                                                                                                         
    networks:                                                                                                                                                                                                                       
      - app_svechka-network                                                                                                                                                                                                         
                                                                                                                                                                                                                                    
volumes:                                                                                                                                                                                                                            
  caddy-data:                                                                                                                                                                                                                       
  caddy-config:                                                                                                                                                                                                                     
                                                                                                                                                                                                                                    
networks:                                                                                                                                                                                                                           
  app_svechka-network:                                                                                                                                                                                                              
    external: true   